<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="100%" stop-color="#1c130d"/>
    </radialGradient>
    <linearGradient id="crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c063"/>
      <stop offset="100%" stop-color="#d69a3a"/>
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd77a"/>
      <stop offset="100%" stop-color="#f4b942"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#d6a854" stroke-width="6" opacity="0.85"/>

  <!-- trail -->
  <path d="M40 404 Q160 376 256 394 T472 390" stroke="#6b4a2e" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ===== BICYCLE ===== -->
  <g stroke="#d6a854" stroke-width="12" fill="none" stroke-linecap="round"><circle cx="150" cy="360" r="62"/><circle cx="366" cy="360" r="62"/></g>
  <g stroke="#8a6a3a" stroke-width="4" opacity="0.8" stroke-linecap="round">
    <line x1="150" y1="360" x2="150" y2="298"/><line x1="150" y1="360" x2="150" y2="422"/>
    <line x1="150" y1="360" x2="88" y2="360"/><line x1="150" y1="360" x2="212" y2="360"/>
    <line x1="366" y1="360" x2="366" y2="298"/><line x1="366" y1="360" x2="366" y2="422"/>
    <line x1="366" y1="360" x2="304" y2="360"/><line x1="366" y1="360" x2="428" y2="360"/>
  </g>
  <g stroke="#e86e4a" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 360 L250 360 L300 270 L200 270 Z"/>
    <line x1="250" y1="360" x2="300" y2="270"/>
    <line x1="366" y1="360" x2="300" y2="270"/>
    <line x1="200" y1="270" x2="178" y2="240"/>
  </g>
  <path d="M166 238 q22 -10 40 4" stroke="#d6a854" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M286 264 q18 -6 30 2" stroke="#d6a854" stroke-width="11" fill="none" stroke-linecap="round"/>
  <circle cx="250" cy="360" r="12" fill="#d6a854"/>
  <line x1="250" y1="360" x2="230" y2="388" stroke="#d6a854" stroke-width="9" stroke-linecap="round"/>
  <line x1="250" y1="360" x2="270" y2="332" stroke="#d6a854" stroke-width="9" stroke-linecap="round"/>

  <!-- ===== PIZZA SLICE RIDER ===== -->
  <g transform="translate(256 168)">
    <!-- slice (point down) -->
    <path d="M-84 -70 L84 -70 L0 96 Z" fill="url(#cheese)" stroke="#e0a83a" stroke-width="5" stroke-linejoin="round"/>
    <!-- crust -->
    <path d="M-84 -70 Q0 -104 84 -70 L84 -70 Q0 -86 -84 -70 Z" fill="url(#crust)" stroke="#c98a2e" stroke-width="4"/>
    <!-- pepperoni -->
    <circle cx="-34" cy="-34" r="15" fill="#e86e4a" stroke="#c94f34" stroke-width="3"/>
    <circle cx="30" cy="-30" r="14" fill="#e86e4a" stroke="#c94f34" stroke-width="3"/>
    <circle cx="-4" cy="12" r="13" fill="#e86e4a" stroke="#c94f34" stroke-width="3"/>
    <!-- basil dots -->
    <circle cx="34" cy="6" r="6" fill="#6f9e3f"/>
    <circle cx="-40" cy="14" r="5" fill="#6f9e3f"/>
    <!-- happy face -->
    <circle cx="-20" cy="-4" r="7" fill="#3a2412"/>
    <circle cx="20" cy="-4" r="7" fill="#3a2412"/>
    <circle cx="-17.5" cy="-6.5" r="2.4" fill="#fff"/>
    <circle cx="22.5" cy="-6.5" r="2.4" fill="#fff"/>
    <path d="M-20 20 q20 22 40 0" stroke="#3a2412" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- rosy cheeks -->
    <circle cx="-34" cy="12" r="7" fill="#ef9aa8" opacity="0.6"/>
    <circle cx="34" cy="12" r="7" fill="#ef9aa8" opacity="0.6"/>
    <!-- little arms to the bars -->
    <path d="M-78 -46 q-26 30 -48 76" stroke="url(#cheese)" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M78 -46 q22 26 34 66" stroke="url(#cheese)" stroke-width="15" fill="none" stroke-linecap="round"/>
  </g>

  <!-- palm frond -->
  <g transform="translate(410 118)" stroke="#7bb661" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M0 60 Q6 10 34 -6"/><path d="M0 60 Q-4 22 -22 6"/><path d="M0 60 Q14 26 40 24"/>
  </g>
</svg>
