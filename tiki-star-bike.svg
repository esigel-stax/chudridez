<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="100%" stop-color="#1c130d"/>
    </radialGradient>
    <linearGradient id="teak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e86e4a"/>
      <stop offset="100%" stop-color="#c94f34"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb3c8"/>
      <stop offset="100%" stop-color="#f27ba0"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#d6a854" stroke-width="6" opacity="0.85"/>

  <!-- ground / trail -->
  <path d="M40 402 Q160 372 256 392 T472 388" stroke="#6b4a2e" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ===== BICYCLE ===== -->
  <g stroke="#d6a854" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="150" cy="360" r="62"/>
    <circle cx="366" cy="360" r="62"/>
  </g>
  <g stroke="#8a6a3a" stroke-width="4" opacity="0.8">
    <g stroke-linecap="round">
      <line x1="150" y1="360" x2="150" y2="298"/><line x1="150" y1="360" x2="150" y2="422"/>
      <line x1="150" y1="360" x2="88" y2="360"/><line x1="150" y1="360" x2="212" y2="360"/>
      <line x1="366" y1="360" x2="366" y2="298"/><line x1="366" y1="360" x2="366" y2="422"/>
      <line x1="366" y1="360" x2="304" y2="360"/><line x1="366" y1="360" x2="428" y2="360"/>
    </g>
  </g>
  <!-- frame -->
  <g stroke="#e86e4a" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 360 L250 360 L300 268 L200 268 Z"/>
    <line x1="250" y1="360" x2="300" y2="268"/>
    <line x1="366" y1="360" x2="300" y2="268"/>
    <line x1="200" y1="268" x2="176" y2="238"/>   <!-- head tube to bars -->
  </g>
  <!-- handlebars + seat + pedals -->
  <path d="M164 236 q22 -10 40 4" stroke="#d6a854" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M286 262 q18 -6 30 2" stroke="#d6a854" stroke-width="11" fill="none" stroke-linecap="round"/>
  <circle cx="250" cy="360" r="12" fill="#d6a854"/>
  <line x1="250" y1="360" x2="230" y2="388" stroke="#d6a854" stroke-width="9" stroke-linecap="round"/>
  <line x1="250" y1="360" x2="270" y2="332" stroke="#d6a854" stroke-width="9" stroke-linecap="round"/>

  <!-- ===== TIKI STARFISH RIDER ===== -->
  <g transform="translate(232 150) scale(1.05)">
    <!-- star body -->
    <path d="M0 -78 L23 -24 L80 -22 L34 14 L50 70 L0 38 L-50 70 L-34 14 L-80 -22 L-23 -24 Z"
          fill="url(#star)" stroke="#c85f80" stroke-width="6" stroke-linejoin="round"/>
    <!-- tiki carved brow -->
    <path d="M-34 -14 q34 -22 68 0 l0 12 q-34 -18 -68 0 Z" fill="#c85f80" opacity="0.55"/>
    <!-- eyes (tiki almond) -->
    <g>
      <path d="M-30 -2 q12 -16 26 0 q-12 12 -26 0 Z" fill="#fff"/>
      <path d="M4 -2 q12 -16 26 0 q-12 12 -26 0 Z" fill="#fff"/>
      <circle cx="-15" cy="-2" r="6" fill="#1c130d"/>
      <circle cx="19" cy="-2" r="6" fill="#1c130d"/>
    </g>
    <!-- carved nose -->
    <path d="M-8 4 L8 4 L0 26 Z" fill="#c85f80"/>
    <!-- tiki grin with teeth -->
    <path d="M-26 34 q26 26 52 0 q-26 10 -52 0 Z" fill="#7a2f47"/>
    <g stroke="#ffd9e2" stroke-width="4">
      <line x1="-14" y1="34" x2="-14" y2="45"/>
      <line x1="0"   y1="37" x2="0"   y2="49"/>
      <line x1="14"  y1="34" x2="14"  y2="45"/>
    </g>
    <!-- little arm reaching to bars -->
    <path d="M-58 -20 q-26 20 -60 74" stroke="url(#star)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M56 -20 q22 18 40 52" stroke="url(#star)" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>

  <!-- palm frond flourish -->
  <g transform="translate(408 120)" stroke="#7bb661" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M0 60 Q6 10 34 -6"/>
    <path d="M0 60 Q-4 22 -22 6"/>
    <path d="M0 60 Q14 26 40 24"/>
  </g>
</svg>
